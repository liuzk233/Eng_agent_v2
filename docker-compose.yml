services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${VSL_POSTGRES_USER:?set VSL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${VSL_POSTGRES_PASSWORD:?set VSL_POSTGRES_PASSWORD}
      POSTGRES_DB: ${VSL_POSTGRES_DB:-vsl}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\""]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      VSL_DATABASE_URL: postgresql+psycopg://${VSL_POSTGRES_USER:?set VSL_POSTGRES_USER}:${VSL_POSTGRES_PASSWORD:?set VSL_POSTGRES_PASSWORD}@db:5432/${VSL_POSTGRES_DB:-vsl}
      VSL_ENVIRONMENT: local
      VSL_JWT_SECRET: ${VSL_JWT_SECRET:?set VSL_JWT_SECRET}
      VSL_CORS_ORIGINS: ${VSL_CORS_ORIGINS:-http://localhost:3000}
      VSL_DB_POOL_SIZE: ${VSL_DB_POOL_SIZE:-20}
      VSL_DB_MAX_OVERFLOW: ${VSL_DB_MAX_OVERFLOW:-40}
      VSL_REDIS_URL: redis://redis:6379/0
      VSL_CELERY_BROKER_URL: redis://redis:6379/0
      VSL_CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      VSL_DATABASE_URL: postgresql+psycopg://${VSL_POSTGRES_USER:?set VSL_POSTGRES_USER}:${VSL_POSTGRES_PASSWORD:?set VSL_POSTGRES_PASSWORD}@db:5432/${VSL_POSTGRES_DB:-vsl}
      VSL_ENVIRONMENT: local
      VSL_JWT_SECRET: ${VSL_JWT_SECRET:?set VSL_JWT_SECRET}
      VSL_DB_POOL_SIZE: ${VSL_DB_POOL_SIZE:-20}
      VSL_DB_MAX_OVERFLOW: ${VSL_DB_MAX_OVERFLOW:-40}
      VSL_REDIS_URL: redis://redis:6379/0
      VSL_CELERY_BROKER_URL: redis://redis:6379/0
      VSL_CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.domain.generation.tasks.celery_app worker --loglevel=INFO

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: http://localhost:8000

volumes:
  pgdata:
